<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>AirPair</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#080818" />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
        background: #111;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        font-size: 16px;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-text-size-adjust: 100%;
      }

      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100%;
        padding: env(safe-area-inset-top, 16px) 24px env(safe-area-inset-bottom, 24px);
      }

      /* Portrait-only landscape warning */
      #landscape-warning {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #111;
        color: #fff;
        font-size: 1.25rem;
        font-weight: 600;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        gap: 16px;
      }

      @media (orientation: landscape) and (hover: none) and (pointer: coarse) {
        #landscape-warning {
          display: flex;
        }
      }

      /* Buttons */
      .btn {
        display: block;
        width: 100%;
        max-width: 320px;
        min-height: 56px;
        padding: 14px 24px;
        border: none;
        border-radius: 12px;
        font-size: 1.125rem;
        font-weight: 700;
        cursor: pointer;
        transition: opacity 0.15s ease;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      .btn:active {
        opacity: 0.75;
      }

      .btn-primary {
        background: #f5f5f5;
        color: #111;
      }

      .btn-secondary {
        background: #2a2a2a;
        color: #fff;
        border: 1px solid #444;
      }

      .btn-tab {
        flex: 1;
        min-height: 44px;
        padding: 10px 16px;
        border: none;
        border-radius: 8px;
        font-size: 1.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        background: transparent;
        color: #aaa;
      }

      .btn-tab.active {
        background: #2a2a2a;
        color: #fff;
      }

      /* Input */
      .input-text {
        display: block;
        width: 100%;
        max-width: 320px;
        min-height: 56px;
        padding: 14px 16px;
        border: 1px solid #444;
        border-radius: 12px;
        background: #1a1a1a;
        color: #fff;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-align: center;
        text-transform: uppercase;
        outline: none;
        -webkit-appearance: none;
      }

      .input-text:focus {
        border-color: #888;
      }

      .input-text::placeholder {
        color: #555;
        letter-spacing: 0.1em;
      }

      /* Layout helpers */
      .screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        gap: 20px;
        padding-top: 48px;
      }

      .screen-title {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
      }

      .screen-subtitle {
        font-size: 2rem;
        color: #888;
        text-align: center;
        max-width: 280px;
      }

      .status-msg {
        font-size: 1.875rem;
        color: #aaa;
        text-align: center;
      }

      .status-msg.success {
        color: #4ade80;
        font-weight: 600;
      }

      .status-msg.error {
        color: #f87171;
      }

      /* QR code container */
      .qr-wrapper {
        background: #fff;
        border-radius: 12px;
        padding: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .room-code {
        font-size: 2.5rem;
        font-weight: 800;
        letter-spacing: 0.2em;
        font-variant-numeric: tabular-nums;
      }

      /* Tab bar for join screen */
      .tab-bar {
        display: flex;
        width: 100%;
        max-width: 320px;
        background: #1a1a1a;
        border-radius: 10px;
        padding: 4px;
        gap: 4px;
      }

      /* Video scanner */
      .video-container {
        position: relative;
        width: 100%;
        max-width: 320px;
        border-radius: 12px;
        overflow: hidden;
        background: #000;
        aspect-ratio: 1;
      }

      .video-container video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .scan-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      .scan-reticle {
        width: 60%;
        height: 60%;
        border: 2px solid rgba(255, 255, 255, 0.8);
        border-radius: 8px;
        box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
      }

      /* Back button */
      .btn-back {
        align-self: flex-start;
        background: none;
        border: none;
        color: #888;
        font-size: 1.875rem;
        cursor: pointer;
        padding: 8px 0;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      .btn-back:active {
        color: #fff;
      }

      /* Countdown screen */
      .screen-countdown {
        justify-content: center;
        min-height: 100%;
      }

      .countdown-number {
        font-size: 9rem;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.02em;
        transition: color 0.15s ease;
      }

      .countdown-number.go {
        font-size: 4rem;
        color: #4ade80;
        letter-spacing: 0.15em;
      }

      /* Logo */
      .logo {
        width: 100%;
        max-width: 220px;
        height: auto;
        display: block;
      }

      @keyframes pulse-in {
        from { transform: scale(1.4); opacity: 0.6; }
        to   { transform: scale(1);   opacity: 1; }
      }

      .countdown-number.pulse {
        animation: pulse-in 0.25s ease-out forwards;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="landscape-warning" aria-live="polite">
      <span style="font-size: 2.5rem">&#8635;</span>
      <span>Tournez votre téléphone</span>
    </div>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
