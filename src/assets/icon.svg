<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="AirPair">
  <title>AirPair</title>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#080818"/>
  <!-- Top paddle — cyan (adversaire) -->
  <rect x="22" y="20" width="56" height="12" rx="6" fill="#00d4e8"/>
  <!-- Trajectory line top paddle → ball -->
  <line x1="50" y1="32" x2="50" y2="42" stroke="#ffe44d" stroke-width="2" stroke-dasharray="2,3" stroke-linecap="round" opacity="0.5"/>
  <!-- Ball -->
  <circle cx="50" cy="50" r="8" fill="#ffe44d"/>
  <!-- Trajectory line ball → bottom paddle -->
  <line x1="50" y1="58" x2="50" y2="68" stroke="#ffe44d" stroke-width="2" stroke-dasharray="2,3" stroke-linecap="round" opacity="0.5"/>
  <!-- Bottom paddle — hot pink (moi) -->
  <rect x="22" y="68" width="56" height="12" rx="6" fill="#ff2d78"/>
</svg>
