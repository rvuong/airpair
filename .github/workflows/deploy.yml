name: Deploy — GitHub Pages
# Actif en Phase 1 quand src/ existe.
# Prérequis dans les settings GitHub du repo :
#   Settings → Pages → Source → GitHub Actions

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/package-lock.json
      - run: npm ci
        working-directory: src
      - run: npm run build
        working-directory: src
        env:
          # Vite a besoin de la base URL pour GitHub Pages : /airpair/
          BASE_URL: /airpair/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: src/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
