<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Pong Bros — Sync Proto</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: #000;
        color: #fff;
        font-family: 'Courier New', Courier, monospace;
        font-size: 16px;
        touch-action: none;
        overscroll-behavior: none;
        overflow: hidden;
      }

      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        padding: 24px 16px;
        gap: 24px;
      }

      h1 {
        font-size: 1.25rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #aaa;
      }

      /* --- Pairing state --- */
      #state-pairing {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        width: 100%;
        max-width: 480px;
      }

      #room-code-display {
        font-size: 4rem;
        letter-spacing: 0.3em;
        color: #0f0;
        font-weight: bold;
        text-align: center;
        padding: 16px 24px;
        border: 2px solid #0f0;
      }

      #room-url {
        font-size: 0.85rem;
        color: #888;
        word-break: break-all;
        text-align: center;
      }

      #pairing-status {
        color: #ff0;
        font-size: 0.9rem;
        letter-spacing: 0.05em;
      }

      #join-form {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        width: 100%;
      }

      #join-label {
        font-size: 0.9rem;
        color: #aaa;
        letter-spacing: 0.05em;
      }

      #room-code-input {
        background: #111;
        color: #fff;
        border: 2px solid #555;
        font-family: inherit;
        font-size: 2rem;
        letter-spacing: 0.3em;
        text-align: center;
        text-transform: uppercase;
        width: 200px;
        padding: 12px 8px;
        outline: none;
      }

      #room-code-input:focus {
        border-color: #0f0;
      }

      #join-error {
        color: #f44;
        font-size: 0.85rem;
        min-height: 1.2em;
      }

      /* --- Buttons --- */
      button {
        background: #111;
        color: #fff;
        border: 2px solid #555;
        font-family: inherit;
        font-size: 1rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 12px 28px;
        cursor: pointer;
        transition: border-color 0.15s, color 0.15s;
        -webkit-tap-highlight-color: transparent;
      }

      button:hover, button:active {
        border-color: #0f0;
        color: #0f0;
      }

      button:disabled {
        opacity: 0.4;
        cursor: default;
      }

      /* --- Measure state --- */
      #state-measure {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        width: 100%;
        max-width: 560px;
      }

      #measure-progress {
        font-size: 0.9rem;
        color: #aaa;
        letter-spacing: 0.05em;
      }

      #ntp-table-wrapper {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      #ntp-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 1rem;
      }

      #ntp-table th {
        color: #888;
        font-weight: normal;
        padding: 8px 16px;
        border-bottom: 1px solid #333;
        text-align: right;
        letter-spacing: 0.05em;
      }

      #ntp-table th:first-child {
        text-align: center;
      }

      #ntp-table td {
        padding: 10px 16px;
        border-bottom: 1px solid #1a1a1a;
        text-align: right;
        font-size: 1rem;
        min-width: 80px;
      }

      #ntp-table td:first-child {
        text-align: center;
        color: #555;
        min-width: 40px;
      }

      #ntp-table tr.current-row td {
        color: #ff0;
      }

      /* --- Summary --- */
      #summary {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
        padding-top: 4px;
      }

      #summary-stats {
        display: flex;
        gap: 32px;
        font-size: 0.9rem;
        color: #aaa;
      }

      #summary-stats span {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      #summary-stats strong {
        font-size: 1.5rem;
        color: #fff;
      }

      #verdict {
        font-size: 1.1rem;
        letter-spacing: 0.05em;
        text-align: center;
        padding: 12px 20px;
        border: 2px solid;
      }

      #verdict.pass {
        color: #0f0;
        border-color: #0f0;
      }

      #verdict.fail {
        color: #f44;
        border-color: #f44;
      }

      /* --- Hidden --- */
      .hidden {
        display: none !important;
      }

      /* --- Connection error --- */
      #conn-error {
        color: #f44;
        font-size: 0.85rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>Pong Bros — Sync</h1>

      <!-- State 1: Pairing -->
      <div id="state-pairing">

        <!-- Landing: choose role -->
        <div id="panel-landing" style="display:flex;flex-direction:column;align-items:center;gap:16px;">
          <button id="btn-create">Créer une partie</button>
          <button id="btn-show-join">Rejoindre une partie</button>
        </div>

        <!-- Client A: shows room code -->
        <div id="panel-host" class="hidden">
          <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
            <div style="color:#aaa;font-size:0.85rem;letter-spacing:0.05em;">CODE DE LA ROOM</div>
            <div id="room-code-display">----</div>
            <div id="room-url"></div>
            <div id="pairing-status">En attente du second client...</div>
          </div>
        </div>

        <!-- Client B: join form -->
        <div id="panel-join" class="hidden">
          <div id="join-form">
            <div id="join-label">SAISIR LE CODE DE LA ROOM</div>
            <input
              id="room-code-input"
              type="text"
              maxlength="4"
              placeholder="XXXX"
              autocomplete="off"
              autocorrect="off"
              spellcheck="false"
            />
            <div id="join-error"></div>
            <button id="btn-join">Rejoindre</button>
          </div>
        </div>

        <!-- Connecting indicator -->
        <div id="panel-connecting" class="hidden">
          <div style="color:#555;font-size:0.9rem;letter-spacing:0.1em;">CONNEXION...</div>
        </div>

        <div id="conn-error" class="hidden"></div>
      </div>

      <!-- State 2: NTP Measure -->
      <div id="state-measure" class="hidden">
        <div id="measure-progress">Itération 0 / 10</div>
        <div id="ntp-table-wrapper">
          <table id="ntp-table">
            <thead>
              <tr>
                <th>SEQ</th>
                <th>RTT (ms)</th>
                <th>OFFSET (ms)</th>
              </tr>
            </thead>
            <tbody id="ntp-tbody">
            </tbody>
          </table>
        </div>
        <div id="summary" class="hidden">
          <div id="summary-stats">
            <span>
              <strong id="stat-rtt">--</strong>
              RTT médian (ms)
            </span>
            <span>
              <strong id="stat-offset">--</strong>
              Offset médian (ms)
            </span>
          </div>
          <div id="verdict"></div>
          <button id="btn-restart">Recommencer</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
