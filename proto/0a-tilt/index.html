<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pong Bros – Proto 0a Tilt</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #fff;
      }

      #canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      #start-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: #000;
        z-index: 10;
      }

      #start-screen h1 {
        font-size: 2rem;
        letter-spacing: 0.05em;
        font-weight: 700;
      }

      #btn-play {
        padding: 16px 48px;
        font-size: 1.25rem;
        font-weight: 600;
        background: #fff;
        color: #000;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      #error-msg {
        color: #ff4444;
        font-size: 0.9rem;
        text-align: center;
        padding: 0 24px;
        display: none;
      }

      #btn-recalibrate {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 8px 14px;
        font-size: 0.8rem;
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        display: none;
        z-index: 20;
        backdrop-filter: blur(4px);
      }

      #landscape-warning {
        position: fixed;
        inset: 0;
        background: #000;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        font-size: 1.2rem;
        z-index: 30;
      }

      #landscape-warning.visible {
        display: flex;
      }

      #silence-banner {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 6px 12px;
        background: rgba(0, 0, 0, 0.6);
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.6);
        text-align: center;
        z-index: 25;
        pointer-events: none;
      }

      #tuning-panel {
        position: fixed;
        bottom: 140px;
        right: 12px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        padding: 10px 14px;
        display: none;
        flex-direction: column;
        gap: 8px;
        z-index: 20;
        backdrop-filter: blur(6px);
        min-width: 220px;
      }

      #tuning-panel.visible {
        display: flex;
      }

      .tuning-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.72rem;
        white-space: nowrap;
      }

      .tuning-row label {
        width: 80px;
        flex-shrink: 0;
        color: rgba(255, 255, 255, 0.75);
      }

      .tuning-row input[type="range"] {
        flex: 1;
        accent-color: #fff;
        cursor: pointer;
      }

      .tuning-val {
        width: 36px;
        text-align: right;
        color: #fff;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div id="start-screen">
      <h1>Pong Bros</h1>
      <button id="btn-play">Jouer</button>
      <p id="error-msg"></p>
    </div>

    <button id="btn-recalibrate">Recalibrer</button>

    <div id="landscape-warning">
      <span style="font-size:2.5rem">&#8635;</span>
      <span>Tournez votre téléphone</span>
    </div>

    <div id="silence-banner">
      Désactivez le mode silencieux pour entendre les sons
    </div>

    <div id="tuning-panel">
      <div class="tuning-row">
        <label>Zone morte</label>
        <input type="range" id="sl-deadzone" min="0" max="5" step="0.1" value="1.5" />
        <span class="tuning-val" id="val-deadzone">1.5°</span>
      </div>
      <div class="tuning-row">
        <label>Amplitude</label>
        <input type="range" id="sl-amplitude" min="5" max="45" step="1" value="20" />
        <span class="tuning-val" id="val-amplitude">20°</span>
      </div>
      <div class="tuning-row">
        <label>Exposant</label>
        <input type="range" id="sl-exponent" min="1.0" max="3.0" step="0.1" value="1.4" />
        <span class="tuning-val" id="val-exponent">1.4</span>
      </div>
      <div class="tuning-row">
        <label>Lissage α</label>
        <input type="range" id="sl-alpha" min="0.05" max="0.9" step="0.05" value="0.3" />
        <span class="tuning-val" id="val-alpha">0.30</span>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
